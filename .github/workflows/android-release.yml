name: Release Android TV

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to release
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build signed APK
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$DISPATCH_TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Generate Android TV project
        run: npm run prebuild:tv --workspace @viuwu/tv

      - name: Restore release key
        env:
          KEYSTORE_BASE64: ${{ secrets.VIUWU_ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE_BASE64"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > apps/tv/android/app/viuwu-release.jks

      - name: Build signed release APK
        env:
          NODE_ENV: production
          VIUWU_RELEASE_STORE_FILE: viuwu-release.jks
          VIUWU_RELEASE_STORE_PASSWORD: ${{ secrets.VIUWU_ANDROID_STORE_PASSWORD }}
          VIUWU_RELEASE_KEY_ALIAS: ${{ secrets.VIUWU_ANDROID_KEY_ALIAS }}
          VIUWU_RELEASE_KEY_PASSWORD: ${{ secrets.VIUWU_ANDROID_KEY_PASSWORD }}
        working-directory: apps/tv/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Verify and package APK
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          APK=apps/tv/android/app/build/outputs/apk/release/app-release.apk
          test -f "$APK"
          "$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)/apksigner" \
            verify --verbose --print-certs "$APK" | tee /tmp/apksigner.txt
          ! grep -q "CN=Android Debug" /tmp/apksigner.txt
          cp "$APK" "viuwu-${RELEASE_TAG}-android-tv.apk"
          shasum -a 256 "viuwu-${RELEASE_TAG}-android-tv.apk" > SHA256SUMS.txt

      - name: Publish GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          cat > /tmp/release-notes.md <<EOF
          Android TV preview of Viuwu's user-controlled guide.

          This release is installable and signed for upgrades, but it uses mock guide data. YouTube
          search, account connection, and video playback are not implemented yet.

          Install with:

          \`\`\`bash
          adb install -r viuwu-${RELEASE_TAG}-android-tv.apk
          \`\`\`
          EOF

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" \
              "viuwu-${RELEASE_TAG}-android-tv.apk" \
              SHA256SUMS.txt \
              --clobber
            gh release edit "$RELEASE_TAG" \
              --prerelease \
              --title "Viuwu ${RELEASE_TAG}" \
              --notes-file /tmp/release-notes.md
          else
            gh release create "$RELEASE_TAG" \
              "viuwu-${RELEASE_TAG}-android-tv.apk" \
              SHA256SUMS.txt \
              --verify-tag \
              --prerelease \
              --title "Viuwu ${RELEASE_TAG}" \
              --notes-file /tmp/release-notes.md
          fi
